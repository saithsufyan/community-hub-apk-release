const AuthScreen=({onAuth,mob})=>{
  const[mode,setMode]=useState("login"); // login | signup
  const[role,setRole]=useState("resident");
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[name,setName]=useState("");
  const[unit,setUnit]=useState("");
  const[err,setErr]=useState("");
  const[showPass,setShowPass]=useState(false);
  const t0={primary:"#1B5E3C",primaryLight:"#E4F2EB",primarySoft:"#2D8B5A",accent:"#C5954B",bg:"#F5F4F0",card:"#fff",text:"#1A1612",soft:"#4A3F35",muted:"#9A8E82",border:"rgba(0,0,0,0.09)"};

  const doLogin=()=>{
    setErr("");
    const found=DEMO_ACCOUNTS.find(a=>a.email===email&&a.password===pass);
    if(found){onAuth(found);return;}
    if(!email.includes("@")){setErr("Please enter a valid email.");return;}
    if(pass.length<6){setErr("Password must be at least 6 characters.");return;}
    // demo: any valid email = resident login
    onAuth({email,role:"resident",name:email.split("@")[0],av:email[0].toUpperCase()+email[1].toUpperCase(),unit:"Community Resident"});
  };
  const doSignup=()=>{
    setErr("");
    if(!name.trim()){setErr("Please enter your full name.");return;}
    if(!email.includes("@")){setErr("Please enter a valid email.");return;}
    if(pass.length<6){setErr("Password must be at least 6 characters.");return;}
    const ini=name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    onAuth({email,role,name,av:ini,unit:unit||"Community Resident"});

                <button onClick={()=>setShowPass(!showPass)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",color:t0.muted,fontSize:13,fontWeight:600}}>{showPass?"Hide":"Show"}</button>

            </div>
            {err&&<div style={{padding:"10px 14px",borderRadius:10,background:"#FEE2E2",color:"#DC2626",fontSize:12,fontWeight:600}}>{err}</div>}
            <button onClick={mode==="login"?doLogin:doSignup} style={{padding:"13px",borderRadius:14,background:`linear-gradient(135deg,${t0.primary},${t0.primarySoft})`,color:"#fff",fontSize:14,fontWeight:800,boxShadow:`0 4px 16px ${t0.primary}33`,marginTop:2}}>
              {mode==="login"?"Sign In →":"Create Account →"}
            </button>
            {/* Demo hint */}
            <div style={{padding:"10px 14px",borderRadius:12,background:t0.bg,border:`1px dashed ${t0.border}`}}>
              <div style={{fontSize:11,fontWeight:700,color:t0.muted,marginBottom:4}}>DEMO CREDENTIALS</div>

                <b>Resident:</b> resident@millbrook.com / resident123<br/>
                <b>Staff:</b> staff@millbrook.com / staff123
              </div>
            </div>
          </div>
        </div>
        <p style={{textAlign:"center",fontSize:11,color:t0.muted,marginTop:16}}>By signing in you agree to our Terms of Service</p>
      </div>
    </div>
  );
};

// ─── News Page ───────────────────────────────────────────────────────────────
const NewsPage=({mob,toast,t,data,openCreate,setOpenCreate})=>{
  const[items,setItems]=useState([
    ...data.announcements.map(a=>({...a,kind:"announce"})),
    ...data.polls.map(p=>({...p,kind:"poll"})),
  ].sort((a,b)=>b.id-a.id));
  const[filter,setFilter]=useState("all");
  const[search,setSearch]=useState("");
  const[nt,setNT]=useState("");const[nc,setNC]=useState("");const[ny,setNY]=useState("general");
  const typeColors={award:t.accent,schedule:t.primary,general:t.primarySoft,update:"#3A7CA5"};
  const postAnnounce=()=>{if(!nt.trim()||!nc.trim())return;const icons={award:"🏆",schedule:"📅",general:"📣",update:"💡"};setItems([{id:Date.now(),title:nt,content:nc,date:"Just now",type:ny,icon:icons[ny],kind:"announce"},...items]);setNT("");setNC("");setOpenCreate(false);toast("Announcement posted!")};
  const vote=(pollId,optIdx)=>{setItems(items.map(it=>{if(it.id!==pollId)return it;if(it.voted)return it;return{...it,voted:true,options:it.options.map((o,i)=>i===optIdx?{...o,votes:o.votes+1}:o)}}));toast("Vote recorded!")};
  const filtered=items.filter(it=>{if(filter!=="all"&&it.kind!==filter)return false;if(search&&!it.title.toLowerCase().includes(search.toLowerCase()))return false;return true});
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:mob?20:24,fontWeight:900,color:t.text,fontFamily:t.headFont}}>Community News</div><div style={{fontSize:12,color:t.muted,marginTop:2}}>Announcements & polls</div></div>
        <button onClick={()=>setOpenCreate(true)} style={{padding:"9px 18px",borderRadius:30,background:t.primary,color:"#fff",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:6}}><Ic.Plus/>Post</button>
      </div>
      <div style={{position:"relative"}}>
        <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:t.muted,pointerEvents:"none"}}><Ic.Search/></div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search news..." style={{...InputStyle(t),paddingLeft:38,borderRadius:30}}/>
      </div>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
        {[["all","All"],["announce","Announcements"],["poll","Polls"]].map(([k,l])=><Chip key={k} label={l} active={filter===k} onClick={()=>setFilter(k)} t={t}/>)}
      </div>
      {filtered.map((item,i)=>{
        if(item.kind==="poll"){
          const total=item.options.reduce((s,o)=>s+o.votes,0);
          return(
            <div key={item.id} style={{background:t.card,borderRadius:18,padding:mob?16:20,boxShadow:t.shadow,border:`1px solid ${t.border}`,animation:`fadeUp .35s ease ${i*50}ms both`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{width:36,height:36,borderRadius:10,background:t.primaryLight,display:"flex",alignItems:"center",justifyContent:"center",color:t.primary}}><Ic.BarC/></div>
                <div><div style={{fontSize:15,fontWeight:800,color:t.text}}>{item.title}</div><div style={{fontSize:11,color:t.muted,marginTop:1}}>{item.date} · Community Poll</div></div>
              </div>
              {item.options.map((opt,oi)=>{
                const pct=total>0?Math.round(opt.votes/total*100):0;
                return(
                  <div key={oi} onClick={()=>vote(item.id,oi)} style={{marginBottom:8,cursor:item.voted?"default":"pointer"}} >
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:13,fontWeight:item.voted?600:500,color:t.text}}><span>{opt.text}</span><span style={{color:t.muted,fontWeight:600}}>{item.voted?`${pct}%`:opt.votes+" votes"}</span></div>
                    <div style={{height:7,borderRadius:8,background:t.bg,overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:8,background:`linear-gradient(90deg,${t.primary},${t.primarySoft})`,width:`${pct}%`,transition:"width .4s ease"}}/>
                    </div>
                  </div>
                );
              })}
              {!item.voted&&<div style={{fontSize:11,color:t.muted,marginTop:10,textAlign:"center"}}>Click an option to vote · {total} votes so far</div>}
            </div>
          );
        }
        return(
          <div key={item.id} style={{background:t.card,borderRadius:18,padding:mob?16:20,boxShadow:t.shadow,border:`1px solid ${t.border}`,animation:`fadeUp .35s ease ${i*50}ms both`}}>
            <div style={{display:"flex",gap:12}}>
              <div style={{width:44,height:44,borderRadius:12,background:`${typeColors[item.type]||t.primary}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{item.icon}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontSize:15,fontWeight:800,color:t.text}}>{item.title}</span>
                  <span style={{padding:"2px 8px",borderRadius:20,background:`${typeColors[item.type]||t.primary}15`,fontSize:10,fontWeight:700,color:typeColors[item.type]||t.primary,textTransform:"capitalize"}}>{item.type}</span>
                </div>
                <div style={{fontSize:13,color:t.soft,lineHeight:1.75,marginTop:8,whiteSpace:"pre-line"}}>{item.content}</div>
                <div style={{fontSize:11,color:t.muted,marginTop:8,fontWeight:600}}>{item.date}</div>
              </div>
            </div>
          </div>
        );
      })}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:t.muted}}>
        <div style={{fontSize:36,marginBottom:8}}>🔍</div>
        <div style={{fontSize:14,fontWeight:600}}>No results found</div>
      </div>}
      <Modal open={openCreate} onClose={()=>setOpenCreate(false)} title="New Announcement" t={t}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <input value={nt} onChange={e=>setNT(e.target.value)} placeholder="Title *" style={InputStyle(t)}/>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {[["award","Award"],["schedule","Schedule"],["general","General"],["update","Update"]].map(([k,l])=><Chip key={k} label={l} active={ny===k} color={{award:t.accent,schedule:t.primary,general:t.primarySoft,update:"#3A7CA5"}[k]} onClick={()=>setNY(k)} t={t}/>)}
          </div>
          <textarea value={nc} onChange={e=>setNC(e.target.value)} placeholder="Content *" rows={4} style={{...InputStyle(t),resize:"vertical"}}/>
          <button onClick={postAnnounce} style={{padding:"13px",borderRadius:12,background:t.primary,color:"#fff",fontSize:14,fontWeight:700}}>Post Announcement</button>
        </div>
      </Modal>
    </div>
  );
};

// ─── Trial ───────────────────────────────────────────────────────────────────
const TRIAL_DAYS=30;
function getTrialInfo(){try{let d=localStorage.getItem("ch_trial_v2");if(!d){d=new Date().toISOString();localStorage.setItem("ch_trial_v2",d)}const e=Math.floor((new Date()-new Date(d))/(864e5));const r=Math.max(0,TRIAL_DAYS-e);return{remaining:r,expired:r<=0}}catch{return{remaining:TRIAL_DAYS,expired:false}}}
function TrialBanner({remaining,t,onDismiss}){const[show,setShow]=useState(true);if(!show)return null;const warn=remaining<=5;return(
  <div style={{padding:"7px 16px",background:warn?t.accentLight:t.primaryLight,borderBottom:`1px solid ${warn?t.accent:t.primary}22`,display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
    <span style={{fontSize:12,fontWeight:700,color:warn?t.accent:t.primary,flex:1}}>{remaining===30?"🎉 Welcome! 30-day free trial started":warn?`⚠️ ${remaining} day${remaining===1?"":"s"} left in trial`:`✓ ${remaining} days remaining in trial`}</span>
    <button onClick={()=>setShow(false)} style={{background:"none",color:t.muted,fontSize:16,lineHeight:1}}>×</button>
  </div>
);}

          <div style={{padding:"6px",borderTop:`1px solid ${t.border}`}}>
            <button onClick={()=>setShowDocs(true)} title="Documents" style={{display:"flex",alignItems:"center",gap:10,padding:collapsed?"9px 0":"8px 12px",justifyContent:collapsed?"center":"flex-start",borderRadius:10,background:"transparent",color:t.muted,fontSize:12,fontWeight:500,width:"100%"}}><Ic.File/>{!collapsed&&"Documents"}</button>
            <button onClick={()=>setCK(null)} title="Switch" style={{display:"flex",alignItems:"center",gap:10,padding:collapsed?"9px 0":"8px 12px",justifyContent:collapsed?"center":"flex-start",borderRadius:10,background:"transparent",color:t.muted,fontSize:12,fontWeight:500,width:"100%"}}><Ic.Switch/>{!collapsed&&"Switch Community"}</button>
          </div>
          <SidebarUserRow collapsed={collapsed}/>
        </div>}

        {/* Main content */}
        <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
          <div style={{padding:mob?"11px 14px":"12px 22px",borderBottom:`1px solid ${t.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.85)",backdropFilter:"blur(12px)",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {mob&&<button onClick={()=>setSB(true)} style={{width:34,height:34,borderRadius:10,background:t.bg,display:"flex",alignItems:"center",justifyContent:"center",color:t.text}}><Ic.Menu/></button>}
              <div style={{fontSize:mob?15:17,fontWeight:800,color:t.text,fontFamily:t.headFont}}>{tabs.find(tb=>tb.id===at)?.label||"Home"}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {at==="requests"&&openReqs>0&&<span style={{padding:"4px 10px",borderRadius:20,background:"#FEE2E2",color:"#DC2626",fontSize:11,fontWeight:700}}>{openReqs} open</span>}
              {mob&&<button onClick={()=>setShowProfile(true)} style={{width:30,height:30,borderRadius:"50%",background:"transparent",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Av ini={user.av} sz={30} bg={isStaff?`linear-gradient(135deg,${t.text},${t.soft})`:`linear-gradient(135deg,${t.primary},${t.accent})`}/>
              </button>}
              <button onClick={()=>setTweaks(!tweaks)} style={{width:34,height:34,borderRadius:10,background:tweaks?t.primaryLight:t.bg,color:tweaks?t.primary:t.muted,display:"flex",alignItems:"center",justifyContent:"center"}} title="Tweaks"><Ic.Grid/></button>
            </div>
          </div>
          <div style={{flex:1,overflow:"auto",padding:mob?14:24,paddingBottom:mob?80:24}}>
            {page()}
          </div>
        </div>
      </div>

      {/* Tweaks panel */}
      {tweaks&&<div style={{position:"fixed",bottom:mob?80:20,right:16,width:248,background:"#fff",borderRadius:18,boxShadow:"0 8px 32px rgba(0,0,0,0.15)",border:`1px solid ${t.border}`,zIndex:150,animation:"scaleIn .2s ease",transformOrigin:"bottom right",maxHeight:"80vh",overflow:"auto"}}>
        <div style={{padding:"14px 16px 10px",borderBottom:`1px solid ${t.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"#fff",borderRadius:"18px 18px 0 0"}}>
          <span style={{fontSize:14,fontWeight:800,color:t.text}}>Tweaks</span>
          <button onClick={()=>setTweaks(false)} style={{width:26,height:26,borderRadius:"50%",background:t.bg,color:t.muted,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic.X/></button>
        </div>
        <div style={{padding:"12px 14px 16px",display:"flex",flexDirection:"column",gap:10}}>
          {/* User info */}
          <div style={{padding:"10px 12px",borderRadius:12,background:isStaff?"#FFFBEB":t.primaryLight,border:`1px solid ${isStaff?"#FDE68A":t.primary+"22"}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <Av ini={user.av} sz={28} bg={isStaff?`linear-gradient(135deg,${t.text},${t.soft})`:`linear-gradient(135deg,${t.primary},${t.accent})`}/>
              <div><div style={{fontSize:12,fontWeight:700,color:t.text}}>{user.name}</div><div style={{fontSize:10,color:isStaff?"#D97706":t.primary,fontWeight:600}}>{isStaff?"Staff · Admin":"Resident"}</div></div>
            </div>
          </div>
          {/* Role switcher */}
          <div style={{fontSize:11,fontWeight:700,color:t.muted,letterSpacing:.6,textTransform:"uppercase"}}>Switch Role (Demo)</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {[["resident","🏠","Resident"],["staff","🛡️","Staff"]].map(([r,ic,l])=>(
              <button key={r} onClick={()=>{setUser({...user,role:r});setAT("home");setTweaks(false);toast(`Switched to ${l} view`);}} style={{padding:"8px",borderRadius:10,background:user.role===r?t.primaryLight:t.bg,border:`1px solid ${user.role===r?t.primary:t.border}`,color:user.role===r?t.primary:t.soft,fontSize:12,fontWeight:user.role===r?700:500,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <span style={{fontSize:18}}>{ic}</span>{l}
              </button>
            ))}
          </div>
          <div style={{fontSize:11,fontWeight:700,color:t.muted,letterSpacing:.6,textTransform:"uppercase"}}>Community</div>
          {Object.keys(themes).map(k=>(
            <button key={k} onClick={()=>{setCK(k);setAT("home");setTweaks(false)}} style={{padding:"8px 12px",borderRadius:10,background:ck===k?t.primaryLight:t.bg,border:`1px solid ${ck===k?t.primary:t.border}`,color:ck===k?t.primary:t.text,fontSize:13,fontWeight:ck===k?700:500,textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
              {ck===k&&<Ic.Check/>}{themes[k].name}
            </button>
          ))}
          <div style={{fontSize:11,fontWeight:700,color:t.muted,letterSpacing:.6,textTransform:"uppercase"}}>Quick Jump</div>
          {tabs.map(tb=>(
            <button key={tb.id} onClick={()=>{setAT(tb.id);setTweaks(false)}} style={{padding:"7px 12px",borderRadius:10,background:at===tb.id?t.primaryLight:t.bg,color:at===tb.id?t.primary:t.soft,fontSize:12,fontWeight:500,textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
              <tb.Icon/>{tb.label}
            </button>
          ))}
          <div style={{borderTop:`1px solid ${t.border}`,paddingTop:10}}>
            <button onClick={()=>{setUser(null);setCK(null);setTweaks(false)}} style={{width:"100%",padding:"9px 12px",borderRadius:10,background:"#FEE2E2",color:"#DC2626",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:8}}><LogoutIcon/>Sign Out</button>
          </div>
        </div>
      </div>}

      {/* Mobile bottom nav */}
      {mob&&<div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:80,background:"rgba(255,255,255,0.94)",backdropFilter:"blur(16px)",borderTop:`1px solid ${t.border}`,display:"flex",justifyContent:"space-around",padding:"5px 0",paddingBottom:"max(8px,env(safe-area-inset-bottom))"}}>
        {tabs.map(tb=>{const a=at===tb.id;const isManage=tb.id==="manage";return(
          <button key={tb.id} onClick={()=>setAT(tb.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",color:a?(isManage?t.text:t.primary):t.muted,padding:"3px 6px",minWidth:42,position:"relative"}}>
            {a&&<div style={{position:"absolute",top:-5,width:24,height:3,borderRadius:4,background:isManage?t.text:t.primary}}/>}
            {tb.id==="requests"&&openReqs>0&&<span style={{position:"absolute",top:0,right:4,width:7,height:7,borderRadius:"50%",background:"#EF4444"}}/>}
            <tb.Icon/>
            <span style={{fontSize:9,fontWeight:a?700:400}}>{tb.label}</span>
          </button>
        );})}
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
